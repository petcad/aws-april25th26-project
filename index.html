<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maya's Quote Blog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-brand">
        <span class="brand-icon">✦</span>
        <div>
          <h1 class="site-title">Words That Build</h1>
          <p class="site-sub">Inspiring quotes by Maya Chen</p>
        </div>
      </div>
      <nav class="header-nav">
        <button class="nav-btn active" data-filter="all">All</button>
        <button class="nav-btn" data-filter="tech">Tech</button>
        <button class="nav-btn" data-filter="growth">Growth</button>
        <button class="nav-btn" data-filter="leadership">Leadership</button>
        <button class="nav-btn" data-filter="life">Life</button>
      </nav>
      <button id="add-btn" class="btn-primary">+ Add Quote</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <p class="hero-label">Quote of the Day</p>
      <blockquote id="hero-quote" class="hero-blockquote"></blockquote>
      <p id="hero-author" class="hero-author"></p>
    </div>
  </section>

  <!-- SEARCH -->
  <div class="search-bar-wrap">
    <input type="text" id="search-input" placeholder="🔍  Search quotes, authors, tags..." />
  </div>

  <!-- QUOTES GRID -->
  <main class="main-content">
    <div id="quotes-grid" class="quotes-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <p>No quotes found. Try a different filter or add one!</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Made with ✦ by Maya Chen &nbsp;·&nbsp;
      <a href="https://linkedin.com/in/mayachen-example" target="_blank">LinkedIn</a> &nbsp;·&nbsp;
      <a href="https://github.com/mayachen-example" target="_blank">GitHub</a>
    </p>
  </footer>

  <!-- ADD / EDIT MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button id="modal-close" class="modal-close">✕</button>
      <h2 id="modal-title">Add Quote</h2>
      <form id="quote-form">
        <label>Quote <span class="req">*</span></label>
        <textarea id="f-text" rows="4" placeholder="Enter the quote..." required></textarea>

        <label>Author <span class="req">*</span></label>
        <input type="text" id="f-author" placeholder="e.g. Maya Angelou" required />

        <label>Category</label>
        <select id="f-category">
          <option value="tech">Tech</option>
          <option value="growth">Growth</option>
          <option value="leadership">Leadership</option>
          <option value="life">Life</option>
        </select>

        <label>Your reflection <span class="optional">(optional)</span></label>
        <textarea id="f-reflection" rows="3" placeholder="Why does this quote resonate with you?"></textarea>

        <div class="form-actions">
          <button type="button" id="cancel-btn" class="btn-outline">Cancel</button>
          <button type="submit" class="btn-primary">Save Quote</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
